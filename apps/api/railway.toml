# Railway config — detectado automaticamente, este arquivo só garante
# defaults sensatos caso o autodetect escolha algo diferente.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "./scripts/start.sh"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

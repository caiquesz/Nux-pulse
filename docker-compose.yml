services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nux_dev}
      POSTGRES_DB: ${POSTGRES_DB:-nux_pulse}
    ports:
      - "5432:5432"
    volumes:
      - ./.volumes/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nux}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./.volumes/redis:/data

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nux}:${POSTGRES_PASSWORD:-nux_dev}@db:5432/${POSTGRES_DB:-nux_pulse}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # Docker + Windows: file-watcher do Next não detecta mudanças via inotify em volumes
      # bind-montados. Polling resolve. ~1-2s de latência, aceitável no dev.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3010:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api
